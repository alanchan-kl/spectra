name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to run"
        type: choice
        default: smoke
        options: [smoke, load, stress, breakpoint, soak]
  schedule:
    - cron: "0 2 * * *" # nightly 02:00 UTC

jobs:
  k6:
    runs-on: ubuntu-latest
    env:
      SYSTEM: system-a
      ENV: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 scenario
        # Defaults to a load test on schedule; honors the dispatch input. Runs
        # from the package dir so reports/ exists and relative imports resolve;
        # handleSummary() (src/lib/summary.ts) writes reports/<scenario>-<ts>.{json,html}.
        working-directory: packages/performance
        run: |
          SCENARIO="${{ github.event.inputs.scenario || 'load' }}"
          mkdir -p reports
          k6 run "src/scenarios/${SCENARIO}.ts"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: k6-report
          path: |
            packages/performance/reports/*.json
            packages/performance/reports/*.html
          if-no-files-found: ignore
