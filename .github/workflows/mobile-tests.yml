name: Mobile Tests

# Mobile runs are heavy (emulator). Run ad-hoc (workflow_dispatch) or as part of
# the "E2E Suite + Unified Report" orchestrator (workflow_call) — never per-PR.
on:
  workflow_dispatch:
  workflow_call: # called (in parallel with web/api) by the report orchestrator

jobs:
  android:
    # Android emulator runs on a Linux runner with KVM.
    runs-on: ubuntu-latest
    # Fan out the suite across parallel runners: each runner boots its OWN emulator
    # and runs ONE tag group. Free runners fit ~1 emulator each, so the parallelism
    # is the matrix — not Maestro --shard-split within a single job. The tag groups
    # smoke / login / products are disjoint and together cover every flow.
    strategy:
      fail-fast: false # one shard failing must not cancel the others
      matrix:
        shard: [smoke, login, products]
    steps:
      - uses: actions/checkout@v4

      # GitHub's ubuntu runner has /dev/kvm but doesn't grant the runner user
      # access by default, so the emulator falls back to software (-accel off)
      # and never boots. This udev rule opens it up for hardware acceleration.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # The app under test isn't committed (apps/ is gitignored), so fetch the
      # Sauce Labs My Demo App APK (pkg com.saucelabs.mydemoapp.android) at the
      # version the flows were verified against.
      - name: Download app under test
        run: |
          mkdir -p packages/mobile/apps
          curl -fL --retry 3 -o packages/mobile/apps/app.apk \
            https://github.com/saucelabs/my-demo-app-android/releases/download/2.2.0/mda-2.2.0-25.apk

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # Install the app, then run THIS shard's tag group. Keep `maestro test`
          # on ONE line — android-emulator-runner mangles backslash continuations.
          # --exclude-tags=negative quarantines the known-broken login-invalid flow
          # (it carries the `login` tag, so it'd otherwise land in the login shard);
          # remove that flag once the flow is fixed.
          # Unique --output per shard: report.yml merges with merge-multiple, which
          # OVERWRITES same-named files — each shard must write its own XML.
          script: |
            adb install -r packages/mobile/apps/app.apk
            mkdir -p allure-results
            maestro test --include-tags=${{ matrix.shard }} --exclude-tags=negative -e APP_ID=com.saucelabs.mydemoapp.android --format junit --test-suite-name "Mobile (Android) — ${{ matrix.shard }}" --output allure-results/mobile-results-${{ matrix.shard }}.xml packages/mobile/flows/

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          # Unique per shard — report.yml gathers these via pattern allure-results-*.
          name: allure-results-mobile-android-${{ matrix.shard }}
          path: allure-results
          if-no-files-found: ignore

  # iOS requires a macOS runner + Xcode Simulator. Uncomment when you have an
  # iOS build to test.
  #
  # ios:
  #   runs-on: macos-latest
