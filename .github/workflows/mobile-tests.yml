  #     - run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
  #     - run: xcrun simctl boot "iPhone 15"
  #     # - run: xcrun simctl install booted packages/mobile/apps/MyApp.app
  #     - run: maestro test -e APP_ID=com.example.app packages/mobile/flows/
