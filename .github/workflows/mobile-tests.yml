name: Mobile Tests

# Mobile runs are heavy (emulator/simulator), so trigger manually or on a
# schedule rather than on every PR.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC

jobs:
  android:
    # Android emulator runs on a Linux runner with KVM.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # The app under test isn't committed (apps/ is gitignored), so fetch the
      # Sauce Labs My Demo App APK (pkg com.saucelabs.mydemoapp.android) at the
      # version the flows were verified against.
      - name: Download app under test
        run: |
          mkdir -p packages/mobile/apps
          curl -fL --retry 3 -o packages/mobile/apps/app.apk \
            https://github.com/saucelabs/my-demo-app-android/releases/download/2.2.0/mda-2.2.0-25.apk

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # Install the app, then run the flows. Keep `maestro test` on ONE line —
          # android-emulator-runner mangles backslash line-continuations, which is
          # what made the flow path resolve to a bare "\" before.
          script: |
            adb install -r packages/mobile/apps/app.apk
            mkdir -p allure-results
            maestro test -e APP_ID=com.saucelabs.mydemoapp.android --format junit --output allure-results/mobile-results.xml packages/mobile/flows/

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-mobile-android
          path: allure-results
          if-no-files-found: ignore

  # iOS requires a macOS runner + Xcode Simulator. Uncomment when you have an
  # iOS build to test.
