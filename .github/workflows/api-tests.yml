name: API Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        system: [system-a]
        env: [staging]
    env:
      SYSTEM: ${{ matrix.system }}
      ENV: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # API tests need no browser — faster than the web job.
      - run: pnpm test:api
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-api-${{ matrix.system }}-${{ matrix.env }}
          path: allure-results
          if-no-files-found: ignore
