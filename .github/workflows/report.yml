name: E2E Suite + Reports

# Fan-out / fan-in: run web, API, and mobile suites in PARALLEL (each a reusable
# workflow), then build TWO Allure reports — Web+API (rich Playwright/Gherkin) and Mobile
# (flat Maestro/JUnit) — and publish them to ONE GitHub Pages site under /web-api/ and
# /mobile/, with a landing page at /. Enable Pages (Settings → Pages → GitHub Actions).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC — all suites + reports in one run

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write # delete the stale github-pages artifact on re-run (see report job)

# Serialize Pages deploys so the nightly cron and manual dispatches never collide
# (overlapping deploys queue/stick on the single github-pages environment).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- fan-out: the three suites run in parallel ------------------------------
  web:
    uses: ./.github/workflows/web-tests.yml
    secrets: inherit
  api:
    uses: ./.github/workflows/api-tests.yml
    secrets: inherit
  mobile:
    uses: ./.github/workflows/mobile-tests.yml
    secrets: inherit

  # ---- fan-in: build TWO reports (web+api, mobile) and deploy them together ---
  report:
    needs: [web, api, mobile]
    if: ${{ !cancelled() }} # build the reports even if a suite failed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile

      # Split the suite artifacts into TWO result sets — one per report. (download-artifact
      # is a no-op if a suite produced nothing, e.g. it failed before writing results.)
      - name: Gather Web results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-web-*
          path: allure-results-webapi
          merge-multiple: true
      - name: Gather API results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-api-*
          path: allure-results-webapi
          merge-multiple: true
      - name: Gather Mobile results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-mobile-*
          path: allure-results-mobile
          merge-multiple: true

      # Published Pages root. The two reports live at <url>/web-api/ and <url>/mobile/.
      - name: Resolve Pages URL
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(gh api "repos/${{ github.repository }}/pages" --jq .html_url 2>/dev/null || echo "")
          echo "PAGES_URL=${url%/}" >> "$GITHUB_ENV"

      # Seed each report's Allure history from its OWN subpath on the live site, so each
      # Trend extends independently. First run (nothing published) 404s → ignored.
      - name: Seed Allure history (both reports)
        continue-on-error: true
        run: |
          seed() {
            mkdir -p "$1/history"
            [ -n "$PAGES_URL" ] || return 0
            for f in history.json history-trend.json duration-trend.json retry-trend.json categories-trend.json; do
              curl -fsSL "$PAGES_URL/$2/history/$f" -o "$1/history/$f" || true
            done
          }
          seed allure-results-webapi web-api
          seed allure-results-mobile mobile

      # Web+API metadata: append run provenance to the environment.properties written by the
      # web/api globalSetup (from getConfig); write the executor (build link + reportUrl).
      - name: Web+API report metadata
        run: |
          mkdir -p allure-results-webapi
          cat >> allure-results-webapi/environment.properties <<EOF
          Commit=${{ github.sha }}
          Branch=${{ github.ref_name }}
          CI.Run=#${{ github.run_number }}
          EOF
          cat > allure-results-webapi/executor.json <<EOF
          {
            "name": "GitHub Actions", "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}",
            "buildName": "#${{ github.run_number }}", "buildOrder": ${{ github.run_number }},
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Spectra Web+API", "reportUrl": "${PAGES_URL}/web-api/"
          }
          EOF

      # Mobile metadata: its own environment.properties (mobile has no getConfig globalSetup)
      # plus executor.
      - name: Mobile report metadata
        run: |
          mkdir -p allure-results-mobile
          cat > allure-results-mobile/environment.properties <<EOF
          Platform=android
          Mobile.App=com.saucelabs.mydemoapp.android
          Commit=${{ github.sha }}
          Branch=${{ github.ref_name }}
          CI.Run=#${{ github.run_number }}
          EOF
          cat > allure-results-mobile/executor.json <<EOF
          {
            "name": "GitHub Actions", "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}",
            "buildName": "#${{ github.run_number }}", "buildOrder": ${{ github.run_number }},
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Spectra Mobile", "reportUrl": "${PAGES_URL}/mobile/"
          }
          EOF

      # Two Allure reports into one site/ tree (--clean only wipes the specific -o dir).
      - name: Generate both Allure reports
        run: |
          mkdir -p site
          pnpm exec allure generate allure-results-webapi --clean -o site/web-api
          pnpm exec allure generate allure-results-mobile --clean -o site/mobile

      # Landing page linking the two reports.
      - name: Write landing page
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Spectra — Test Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh;
                     display: grid; place-items: center; background: #0d1117; color: #e6edf3; }
              .wrap { text-align: center; padding: 2rem; }
              h1 { margin: 0 0 .25rem; font-size: 1.8rem; }
              p.sub { color: #8b949e; margin: 0 0 2rem; }
              .cards { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
              a.card { display: block; min-width: 230px; padding: 1.5rem; border: 1px solid #30363d;
                       border-radius: 12px; text-decoration: none; color: #e6edf3; background: #161b22;
                       transition: transform .15s, border-color .15s; }
              a.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
              .card h2 { margin: .25rem 0; font-size: 1.2rem; }
              .card span { color: #8b949e; font-size: .85rem; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <h1>Spectra — Test Reports</h1>
              <p class="sub">Allure reports from the latest run</p>
              <div class="cards">
                <a class="card" href="./web-api/"><h2>🌐 Web + API</h2><span>Playwright · Gherkin · steps &amp; traces</span></a>
                <a class="card" href="./mobile/"><h2>📱 Mobile</h2><span>Maestro · flows by feature suite</span></a>
              </div>
            </div>
          </body>
          </html>
          HTML

      # Re-running re-uploads "github-pages"; delete any stale copy so deploy sees exactly one.
      - name: Remove stale github-pages artifact (re-run safety)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' \
          | while read -r id; do
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
            done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
