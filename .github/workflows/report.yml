name: Unified Allure Report

# Runs the functional suites, folds in the latest mobile results, builds ONE
# Allure report (web + API + mobile), and publishes it to GitHub Pages. Enable
# Pages (Settings → Pages → GitHub Actions) for the deploy step to work.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # nightly 04:00 UTC, after the test workflows

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # let `gh` list/download the latest Mobile Tests artifact

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      SYSTEM: system-a
      ENV: staging
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spectra/web exec playwright install --with-deps chromium

      # Collect results from every functional layer into allure-results/
      - run: pnpm test:api || true
      - run: pnpm test:web || true

      # Mobile runs in its own (heavy) workflow; fold its latest results into this
      # report so Pages shows web + API + mobile. Graceful if no mobile run exists.
      - name: Pull latest mobile results into the report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # newest FINISHED mobile run (pass or fail — we want failures in the report too)
          RUN_ID=$(gh run list --workflow mobile-tests.yml --status completed --limit 1 \
            --json databaseId -q '.[0].databaseId // empty')
          if [ -n "$RUN_ID" ] && gh run download "$RUN_ID" -n allure-results-mobile-android -D mobile-dl; then
            mkdir -p allure-results
            # gh may nest the artifact in a subdir — flatten the JUnit xml into allure-results/
            find mobile-dl -name '*.xml' -exec cp {} allure-results/ \;
            echo "Merged mobile results from run $RUN_ID"
          else
            echo "No mobile artifact to merge — report will omit mobile."
          fi

      - name: Generate unified Allure report
        run: pnpm report:generate

      - uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - id: deploy
        uses: actions/deploy-pages@v4
