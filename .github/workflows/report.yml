name: E2E Suite + Unified Report

# Fan-out / fan-in: run the web, API, and mobile suites in PARALLEL (each is a
# reusable workflow), then merge all their Allure results into ONE report and
# publish it to GitHub Pages. Enable Pages (Settings → Pages → GitHub Actions)
# for the deploy step to work.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC — all suites + report in one run

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write # delete the stale github-pages artifact on re-run (see report job)

jobs:
  # ---- fan-out: the three suites run in parallel ------------------------------
  web:
    uses: ./.github/workflows/web-tests.yml
    secrets: inherit
  api:
    uses: ./.github/workflows/api-tests.yml
    secrets: inherit
  mobile:
    uses: ./.github/workflows/mobile-tests.yml
    secrets: inherit

  # ---- fan-in: merge every suite's results into one report -------------------
  report:
    needs: [web, api, mobile]
    if: ${{ !cancelled() }} # build the report even if a suite failed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: pnpm install --frozen-lockfile

      # Same-run artifacts from the reusable suite workflows. The pattern grabs
      # web + API + mobile JUnit but NOT maestro-debug-android (screenshots).
      - name: Gather all suite results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      # Allure's trend graphs come from a history/ folder carried over from the
      # PREVIOUS report. Seed it from the currently-published Pages site before
      # generating, so each run extends the trend instead of starting blank.
      # First run (Pages not yet deployed) 404s → continue-on-error keeps it green.
      - name: Restore Allure history (enables trend graphs)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p allure-results/history
          url=$(gh api "repos/${{ github.repository }}/pages" --jq .html_url 2>/dev/null || true)
          if [ -n "$url" ]; then
            for f in history.json history-trend.json duration-trend.json retry-trend.json categories-trend.json; do
              curl -fsSL "${url%/}/history/$f" -o "allure-results/history/$f" || true
            done
          fi

      # The config-derived keys (SYSTEM/ENV/URLs/app) are written by the web/api suites'
      # globalSetup from getConfig() — no hardcoded values — and arrive via the merge
      # above. Append only the CI run provenance, which is GitHub context, not config.
      - name: Append run provenance to Allure environment
        run: |
          mkdir -p allure-results
          cat >> allure-results/environment.properties <<EOF
          Commit=${{ github.sha }}
          Branch=${{ github.ref_name }}
          CI.Run=#${{ github.run_number }}
          EOF

      # Executor metadata → the "Executors" widget, and makes history/trend points identify
      # their CI run (instead of "unknown") and link back to it. buildOrder orders the trend.
      - name: Write Allure executor metadata (traceability)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p allure-results
          report_url=$(gh api "repos/${{ github.repository }}/pages" --jq .html_url 2>/dev/null || echo "")
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}",
            "buildName": "E2E #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Spectra E2E",
            "reportUrl": "${report_url}"
          }
          EOF

      - name: Generate unified Allure report
        run: pnpm report:generate

      # Re-running a job re-runs this report job, which uploads a SECOND
      # "github-pages" artifact while the prior attempt's copy still exists →
      # actions/deploy-pages fails ("Multiple artifacts named github-pages").
      # Delete any stale copy first so deploy sees exactly one. No-op on a fresh run.
      - name: Remove stale github-pages artifact (re-run safety)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' \
          | while read -r id; do
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
            done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - id: deploy
        uses: actions/deploy-pages@v4
