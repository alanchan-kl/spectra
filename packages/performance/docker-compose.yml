# Free, self-hosted performance dashboard: InfluxDB (stores k6 metrics) +
# Grafana (visualises them). Run `pnpm grafana:up`, then stream k6 results with
# `pnpm test:load:influx`. Open Grafana at http://localhost:3000.
services:
  influxdb:
    image: influxdb:1.8
    container_name: spectra-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6

  grafana:
    image: grafana/grafana:latest
    container_name: spectra-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
