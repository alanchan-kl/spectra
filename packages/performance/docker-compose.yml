# Free, self-hosted performance dashboard: InfluxDB (stores k6 metrics) +
# Grafana (visualises them). Run `pnpm grafana:up`, then stream k6 results with
# `pnpm test:load:influx`. Open Grafana at http://localhost:3000.
services:
  influxdb:
    image: influxdb:1.8
    container_name: spectra-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6

  grafana:
    image: grafana/grafana:latest
    container_name: spectra-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

  # Containerised k6 — run scenarios without installing k6 on the host.
  # The image's entrypoint is `k6`, so pass `run`/`inspect` + args via:
  #   docker compose run --rm k6 run src/scenarios/smoke.ts
  #   docker compose run --rm k6 inspect src/scenarios/load.ts   # dry run, 0 requests
  # Behind the "k6" profile so `grafana:up` (compose up) doesn't launch it.
  k6:
    image: grafana/k6:latest        # k6 >= 0.57 runs TypeScript natively
    container_name: spectra-k6
    profiles: ["k6"]
    working_dir: /work
    volumes:
      - .:/work                     # mount the whole package so relative imports resolve
    # For InfluxDB output, target the peer container hostname, not localhost:
    #   docker compose run --rm k6 run --out influxdb=http://influxdb:8086/k6 src/scenarios/load.ts
