# Free, self-hosted performance dashboard: InfluxDB (stores k6 metrics) +
# Grafana (visualises them). Run `pnpm grafana:up`, then stream k6 results with
# `pnpm test:load:influx`. Open Grafana at http://localhost:3000.
services:
  influxdb:
    image: influxdb:1.8
    container_name: spectra-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6

  grafana:
    image: grafana/grafana:latest
    container_name: spectra-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

  # Tiny local mock API so load/stress tests can generate real curves WITHOUT
  # hitting any public/demo API. k6 targets it via -e BASE_URL=http://mockapi.
  mockapi:
    image: nginx:alpine
    container_name: spectra-mockapi
    volumes:
      - ./mock/default.conf:/etc/nginx/conf.d/default.conf:ro

  # Containerised k6 — run scenarios without installing k6 on the host.
  # Pass `run`/`inspect` + args via:
  #   docker compose run --rm k6 run src/scenarios/smoke.ts
  #   docker compose run --rm k6 inspect src/scenarios/load.ts   # dry run, 0 requests
  # Behind the "k6" profile so `grafana:up` (compose up) doesn't launch it.
  k6:
    image: grafana/k6:latest        # k6 >= 0.57 runs TypeScript natively
    container_name: spectra-k6
    profiles: ["k6"]
    working_dir: /work
    # Wrapper pre-creates reports/<scenario>-<ts>/ for `run` (k6 can't mkdir at
    # summary time), then execs k6; inspect/version pass straight through.
    entrypoint: ["sh", "/work/scripts/k6-report-entrypoint.sh"]
    volumes:
      - .:/work                     # mount the whole package so relative imports resolve
    depends_on:
      - mockapi                     # auto-start the mock so BASE_URL=http://mockapi runs work standalone
    # For InfluxDB output, target the peer container hostname, not localhost:
    #   docker compose run --rm k6 run --out influxdb=http://influxdb:8086/k6 src/scenarios/load.ts
