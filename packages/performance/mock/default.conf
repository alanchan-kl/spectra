# Tiny mock API target for local load/stress tests. Mirrors the jsonplaceholder
# shape the journey uses (GET /posts and GET /posts/1), so k6 can generate real
# load curves without hitting any public/demo API. Responses are inline (no disk
# I/O), so the mock itself never bottlenecks the test.
server {
    listen 80;
    default_type application/json;

    location = /posts/1 {
        return 200 '{"id":1,"userId":1,"title":"mock post","body":"mock body"}';
    }

    location = /posts {
        return 200 '[{"id":1,"title":"a"},{"id":2,"title":"b"},{"id":3,"title":"c"}]';
    }

    location = /comments {
        return 200 '[{"id":1,"postId":1,"body":"mock comment"},{"id":2,"postId":1,"body":"mock comment"}]';
    }

    location / {
        return 200 '{"ok":true}';
    }
}
