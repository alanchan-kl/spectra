# Reusable subflow: launch the app and submit the login form. Performs the login
# ACTION only — the calling flow asserts the outcome (success OR rejection), so
# the one subflow serves both positive and negative tests. Parameterised: override
# creds via runFlow env, or rely on the defaults.
#   - runFlow:
#       file: ../subflows/login.yaml
#       env:
#         USERNAME: alice@example.com
#         PASSWORD: secret
appId: ${APP_ID}
env:
  USERNAME: bob@example.com
  PASSWORD: "10203040"
---
- runFlow: launch.yaml # same dir → subflows/launch.yaml (cold start)
- extendedWaitUntil:
    visible: "Products"
    timeout: 60000
- tapOn:
    id: "menuIV"
- tapOn: "Log In"
- tapOn:
    id: "nameET"
- inputText: ${USERNAME}
- tapOn:
    id: "passwordET"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: "loginBtn"
