# Products journey — browse the catalog and open a product's detail page.
# Verified against the running native app (Android resource-ids + visible text).
#
# To extend into an add-to-cart journey, open the detail page and use Maestro
# Studio (`pnpm --filter @spectra/mobile studio`) to capture the (below-the-fold)
# "Add to cart" button id, then append a scroll + tap + cart-badge assertion.
appId: ${APP_ID}
tags:
  - regression
  - products
---
- runFlow: ../subflows/open-catalog.yaml
- tapOn: "Sauce Labs Backpack"
# The detail page shows selectable colour variants
- assertVisible: "Sauce Labs Backpack (green)"
- takeScreenshot: screenshots/products/product-detail
